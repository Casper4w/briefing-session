<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>說明會互動投票</title>
    <style>
      /* 全局基礎設定 */
      body { 
        font-family: '微軟正黑體', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        background-color: #f0f4f8; 
        margin: 0; 
        padding: 20px 15px; 
        color: #334155;
      }

      /* 內容主容器 */
      .container { 
        max-width: 600px; /* 電腦版最大寬度 */
        margin: 0 auto; 
        background: #ffffff; 
        padding: 30px 25px; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
      }

      h2 { 
        font-size: 1.5rem; 
        margin: 0 0 10px 0; 
        text-align: center; 
        color: #0f172a;
      }

      .subtitle { 
        color: #64748b; 
        font-size: 0.95rem; 
        text-align: center; 
        margin-bottom: 25px; 
      }
      
      /* ★ RWD 動態網格排版 ★ */
      .options-grid { 
        display: grid; 
        /* 核心魔法：最小欄寬 140px，空間夠就自動增加欄數，不夠就自動換行 */
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
        gap: 15px; 
        margin-bottom: 30px; 
      }
      
      /* 自訂美化 Checkbox 樣式 */
      .option-label {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px 10px; 
        background: #f8fafc; 
        border: 2px solid #e2e8f0;
        border-radius: 10px; 
        cursor: pointer; 
        font-size: 1rem; 
        font-weight: 500;
        text-align: center;
        transition: all 0.2s ease-in-out; 
        user-select: none; 
        word-break: break-word;
        height: 100%;
        box-sizing: border-box;
      }

      .option-input { display: none; }
      
      /* 被選取時的樣式 */
      .option-input:checked + .option-label {
        background-color: #e0f2fe; 
        border-color: #0288d1; 
        color: #0369a1; 
        font-weight: 700;
        box-shadow: 0 4px 6px rgba(2, 136, 209, 0.1);
      }
      
      /* 送出按鈕樣式 */
      button { 
        width: 100%; 
        background-color: #0288d1; 
        color: white; 
        padding: 16px; 
        border: none; 
        border-radius: 10px; 
        font-size: 1.1rem; 
        font-weight: bold; 
        cursor: pointer; 
        transition: background-color 0.2s;
        box-shadow: 0 4px 6px rgba(2, 136, 209, 0.2);
      }

      button:hover { background-color: #0277bd; }
      button:disabled { background-color: #94a3b8; cursor: not-allowed; box-shadow: none; }
      
      #msg { 
        text-align: center; 
        font-weight: bold; 
        margin-top: 15px; 
        color: #16a34a; 
      }

      /* 針對超小螢幕 (如舊款 iPhone) 的微調 */
      @media (max-width: 350px) {
        .options-grid { grid-template-columns: 1fr; /* 單欄顯示 */ }
      }
    </style>
  </head>
  <body>

    <div class="container" id="voteBox">
      <h2>📊 互動調查</h2>
      <div class="subtitle">請勾選您感興趣的主題（可複選）</div>
      
      <div class="options-grid" id="optionsContainer"></div>
      
      <button onclick="submitVote()" id="submitBtn">送出投票</button>
      <div id="msg"></div>
    </div>

    <script>
      // ★ 您的 GAS API 網址 ★
      const API_URL = 'https://script.google.com/macros/s/AKfycbxFNinnfKetaUQa4s07js1J0xB3SMztKc1vtCZYu4dAnq7N1exNlzzL65mC3VvRbarzdQ/exec';

      // ★ 16 個選項 (已將「豆包」替換為「其他」) ★
      const options = [
        "ChatGPT", "Google Gemini", 
        "Perplexity", "Microsoft Copilot",
        "Claude", "Google Ai Studio", 
        "Canva AI", "Gamma",
        "Adobe GenStudio", "Notion AI", 
        "Midjourney", "Suno",
        "DeepSeek", "Seedance2", 
        "King AI", "其他"
      ];

      // 自動渲染 16 個選項
      const container = document.getElementById('optionsContainer');
      options.forEach((opt, index) => {
        container.innerHTML += `
          <div>
            <input type="checkbox" id="opt_${index}" class="option-input" value="${opt}">
            <label for="opt_${index}" class="option-label">${opt}</label>
          </div>
        `;
      });

      async function submitVote() {
        // 收集所有被勾選的數值
        const checkedBoxes = document.querySelectorAll('.option-input:checked');
        const selectedWords = Array.from(checkedBoxes).map(cb => cb.value);
        
        if (selectedWords.length === 0) {
          alert('請至少選擇一個選項！');
          return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '傳送中...';

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'submitWords', words: selectedWords })
          });
          const result = await response.json();
          
          if (result.status === 'success') {
            document.getElementById('voteBox').innerHTML = `
              <div style="text-align:center; padding: 20px 0;">
                <h2 style="color:#16a34a; font-size: 1.8rem; margin-bottom:15px;">🎉 投票成功！</h2>
                <p style="color:#475569; font-size: 1.1rem; line-height: 1.6;">
                  感謝您的參與<br>
                  請觀看前方大螢幕的即時文字雲
                </p>
              </div>
            `;
          } else {
            alert('後端發生錯誤：\n' + result.message);
            btn.disabled = false;
            btn.innerText = '送出投票';
          }
        } catch (error) {
          console.error(error);
          alert('連線失敗，請檢查網路連線後重新送出。');
          btn.disabled = false;
          btn.innerText = '送出投票';
        }
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時文字雲看板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
      body { font-family: '微軟正黑體', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; overflow: hidden; }
      .header { text-align: center; margin-bottom: 10px; }
      h1 { font-size: 28px; margin: 0 0 5px 0; color: #38bdf8; }
      .status { font-size: 14px; color: #94a3b8; }
      #canvasContainer { width: 90vw; height: 75vh; margin: 0 auto; background: #1e293b; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); padding: 10px; }
      canvas { width: 100%; height: 100%; }
    </style>
  </head>
  <body>

    <div class="header">
      <h1>📊 現場焦點即時文字雲</h1>
      <div class="status" id="statusText">系統準備中...</div>
    </div>

    <div id="canvasContainer">
      <canvas id="cloudCanvas"></canvas>
    </div>

    <script>
      // ★ 已替換為您專屬的 GAS 網址 ★
      const API_URL = 'https://script.google.com/macros/s/AKfycbxFNinnfKetaUQa4s07js1J0xB3SMztKc1vtCZYu4dAnq7N1exNlzzL65mC3VvRbarzdQ/exec';
      
      async function updateCloud() {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'getCloudData' })
          });
          const result = await response.json();
          
          if (result.status === 'success') {
            if (result.data.length > 0) {
              draw(result.data);
              document.getElementById('statusText').innerText = `自動同步中 (最後更新：${new Date().toLocaleTimeString()})`;
            } else {
              document.getElementById('statusText').innerText = '目前尚無投票數據，等待觀眾掃碼...';
            }
          } else {
            document.getElementById('statusText').innerText = '⚠️ 系統錯誤：' + result.message;
          }
        } catch (error) {
          console.error(error);
          document.getElementById('statusText').innerText = '連線異常，正嘗試重新連線...';
        }
      }

      function draw(wordData) {
        const canvas = document.getElementById('cloudCanvas');
        const container = document.getElementById('canvasContainer');
        
        // 確保畫布解析度與容器相符
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        WordCloud(canvas, { 
          list: wordData,
          gridSize: Math.round(canvas.width / 80),
          weightFactor: 2.5, // 如果字太大或太小，可以微調這個數字
          fontFamily: '微軟正黑體, Arial, sans-serif',
          color: function() {
            // 深色背景下隨機產生明亮的顏色
            const colors = ['#38bdf8', '#34d399', '#f43f5e', '#fbbf24', '#a78bfa', '#fb7185', '#2dd4bf'];
            return colors[Math.floor(Math.random() * colors.length)];
          },
          backgroundColor: '#1e293b',
          rotateRatio: 0.3 // 30% 垂直呈現
        });
      }

      // 進入網頁立刻執行一次
      updateCloud();
      
      // 每 5 秒 (5000 毫秒) 自動重新拉取一次數據
      setInterval(updateCloud, 5000);
    </script>
  </body>
</html>
